pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    def flutterSdkPath = System.getenv('FLUTTER_ROOT') ?: System.getProperty('flutter.sdk')
    if (flutterSdkPath != null && new File(flutterSdkPath).exists()) {
        includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")
    } else {
        // 如果找不到 Flutter SDK，尝试从标准仓库获取插件版本信息
        repositories {
            maven { url 'https://storage.googleapis.com/flutter_infra_release/flutter' }
        }
    }
}

plugins {
    id "com.android.application" version "8.2.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
    id "dev.flutter.flutter-gradle-plugin" apply false
}

include ":app"
