pluginManagement {
    def flutterSdkPath = System.getenv('FLUTTER_ROOT') ?: System.getProperty('flutter.sdk')
    if (flutterSdkPath == null) {
        throw new GradleException("Flutter SDK not found. Define flutter.sdk in local.properties or FLUTTER_ROOT environment variable.")
    }

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
        maven {
            url "${flutterSdkPath}/.m2"
        }
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "0.0.+" apply false
    id "com.android.application" version "8.1.0" apply false
    id "org.jetbrains.kotlin.android" version "1.7.10" apply false
}

include ":app"
